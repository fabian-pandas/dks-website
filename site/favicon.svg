<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100">
  <g fill="none" stroke="#14141a" stroke-width="2.4" stroke-linecap="round">
    <!-- octagon perimeter -->
    <line x1="0" y1="-36" x2="25.46" y2="-25.46"/>
    <line x1="25.46" y1="-25.46" x2="36" y2="0"/>
    <line x1="36" y1="0" x2="25.46" y2="25.46"/>
    <line x1="25.46" y1="25.46" x2="0" y2="36"/>
    <line x1="0" y1="36" x2="-25.46" y2="25.46"/>
    <line x1="-25.46" y1="25.46" x2="-36" y2="0"/>
    <line x1="-36" y1="0" x2="-25.46" y2="-25.46"/>
    <line x1="-25.46" y1="-25.46" x2="0" y2="-36"/>
    <!-- spokes from center -->
    <line x1="0" y1="0" x2="0" y2="-36"/>
    <line x1="0" y1="0" x2="25.46" y2="-25.46"/>
    <line x1="0" y1="0" x2="36" y2="0"/>
    <line x1="0" y1="0" x2="25.46" y2="25.46"/>
    <line x1="0" y1="0" x2="0" y2="36"/>
    <line x1="0" y1="0" x2="-25.46" y2="25.46"/>
    <line x1="0" y1="0" x2="-36" y2="0"/>
    <line x1="0" y1="0" x2="-25.46" y2="-25.46"/>
    <!-- skip-1 chords -->
    <line x1="0" y1="-36" x2="36" y2="0"/>
    <line x1="25.46" y1="-25.46" x2="25.46" y2="25.46"/>
    <line x1="36" y1="0" x2="0" y2="36"/>
    <line x1="25.46" y1="25.46" x2="-25.46" y2="25.46"/>
    <line x1="0" y1="36" x2="-36" y2="0"/>
    <line x1="-25.46" y1="25.46" x2="-25.46" y2="-25.46"/>
    <line x1="-36" y1="0" x2="0" y2="-36"/>
    <line x1="-25.46" y1="-25.46" x2="25.46" y2="-25.46"/>
    <!-- skip-2 long diagonals -->
    <line x1="0" y1="-36" x2="25.46" y2="25.46"/>
    <line x1="0" y1="-36" x2="-25.46" y2="25.46"/>
    <line x1="25.46" y1="-25.46" x2="0" y2="36"/>
    <line x1="25.46" y1="-25.46" x2="-36" y2="0"/>
    <line x1="36" y1="0" x2="-25.46" y2="25.46"/>
    <line x1="36" y1="0" x2="-25.46" y2="-25.46"/>
    <line x1="25.46" y1="25.46" x2="-36" y2="0"/>
    <line x1="25.46" y1="25.46" x2="0" y2="-36"/>
    <!-- through-center diameters -->
    <line x1="0" y1="-36" x2="0" y2="36"/>
    <line x1="-36" y1="0" x2="36" y2="0"/>
    <line x1="-25.46" y1="-25.46" x2="25.46" y2="25.46"/>
    <line x1="25.46" y1="-25.46" x2="-25.46" y2="25.46"/>
    <line x1="0" y1="36" x2="-25.46" y2="-25.46"/>
  </g>
  <g fill="#f4f3ef" stroke="#14141a" stroke-width="3" paint-order="stroke fill">
    <circle cx="0" cy="-36" r="6"/>
    <circle cx="25.46" cy="-25.46" r="6"/>
    <circle cx="36" cy="0" r="6"/>
    <circle cx="25.46" cy="25.46" r="6"/>
    <circle cx="0" cy="36" r="6"/>
    <circle cx="-25.46" cy="25.46" r="6"/>
    <circle cx="-36" cy="0" r="6"/>
    <circle cx="-25.46" cy="-25.46" r="6"/>
  </g>
  <circle cx="0" cy="0" r="3" fill="oklch(0.65 0.16 145)"/>
</svg>
